name: Release packages

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  portable-and-deb:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.92'
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y libgl1-mesa-dev libx11-dev libxcb1-dev libwayland-dev libxkbcommon-dev
      - run: cargo test --all-targets --locked
      - run: cargo build --release --locked
      - run: cargo install cargo-deb --locked
      - run: cargo deb --locked
      - run: ./scripts/make-dist.sh
      - name: Portable binary archive
        run: |
          mkdir -p release/pixelkit-${{ github.ref_name }}-linux-x86_64
          cp target/release/pixelkit README.md LICENSE NOTICE release/pixelkit-${{ github.ref_name }}-linux-x86_64/
          tar -C release -cJf release/pixelkit-${{ github.ref_name }}-linux-x86_64.tar.xz pixelkit-${{ github.ref_name }}-linux-x86_64
          sha256sum release/*.tar.xz target/debian/*.deb > release/SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*
            target/debian/*.deb
            dist/*

  rpm:
    runs-on: ubuntu-24.04
    container: fedora:44
    steps:
      - uses: actions/checkout@v5
      - name: Install RPM toolchain
        run: dnf install -y rust cargo gcc make rpm-build xz libX11-devel libxcb-devel libxkbcommon-devel wayland-devel
      - run: ./scripts/make-dist.sh
      - name: Build RPM and SRPM
        run: |
          mkdir -p "$PWD/rpmbuild"/{BUILD,BUILDROOT,RPMS,SOURCES,SPECS,SRPMS}
          cp dist/pixelkit-*-vendor.tar.xz "$PWD/rpmbuild/SOURCES/"
          cp packaging/rpm/pixelkit.spec "$PWD/rpmbuild/SPECS/"
          rpmbuild --define "_topdir $PWD/rpmbuild" -ba "$PWD/rpmbuild/SPECS/pixelkit.spec"
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            rpmbuild/RPMS/**/*.rpm
            rpmbuild/SRPMS/*.rpm
